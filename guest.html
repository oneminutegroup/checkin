<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Guest Verification</title>

<style>
body {
  font-family: Arial;
  background:#f5f5f5;
  padding:20px;
}
.container {
  max-width:400px;
  margin:auto;
  background:white;
  padding:20px;
  border-radius:10px;
}
button {
  width:100%;
  padding:12px;
  margin-top:10px;
  font-size:16px;
}
select {
  width:100%;
  padding:10px;
  margin-top:10px;
}
.hidden { display:none; }
</style>
</head>

<body>

<div class="container">

<h2>Are you our guest?</h2>

<div id="step1">
  <button onclick="goStep2()">Yes, I am a guest</button>
  <button>No, but I want to book</button>
</div>

<div id="step2" class="hidden">
  <button onclick="startCheckin()">I'm checking in today</button>
  <button>I'm staying in already</button>
</div>

<div id="step3" class="hidden">
  <h3>Select your name</h3>
  <select id="name"></select>

  <h3>Select check-in</h3>
  <select id="checkin"></select>

  <h3>Select check-out</h3>
  <select id="checkout"></select>

  <button onclick="verify()">Verify</button>
</div>

<div id="result" class="hidden">
  <h3>Success</h3>
  <p id="room"></p>
  <p id="pw"></p>
</div>

</div>

<script>

const API_URL = "https://script.google.com/macros/s/AKfycbyMVxYwhu6jFraFkivrFlw-yh0HNRfKidPIKGGnaiBEbIunJVXMTL1GUF_YXKr3RSSC/exec";

function goStep2(){
  document.getElementById("step1").classList.add("hidden");
  document.getElementById("step2").classList.remove("hidden");
}

async function startCheckin(){
  document.getElementById("step2").classList.add("hidden");
  document.getElementById("step3").classList.remove("hidden");

  const res = await fetch(API_URL + "?action=getOptions");
  const data = await res.json();

  fillSelect("name", data.names);
  fillSelect("checkin", data.checkins);
  fillSelect("checkout", data.checkouts);
}

function fillSelect(id, arr){
  const sel = document.getElementById(id);
  sel.innerHTML = "";
  arr.forEach(v=>{
    const o = document.createElement("option");
    o.value = v;
    o.text = v;
    sel.appendChild(o);
  });
}

async function verify(){

  const name = document.getElementById("name").value;
  const checkin = document.getElementById("checkin").value;
  const checkout = document.getElementById("checkout").value;

  const url =
    API_URL +
    "?action=verifyGuest" +
    "&name=" + encodeURIComponent(name) +
    "&checkin=" + encodeURIComponent(checkin) +
    "&checkout=" + encodeURIComponent(checkout);

  const res = await fetch(url);
  const data = await res.json();

  if(!data.success){
    alert("Wrong. Try again.");
    return;
  }

  document.getElementById("step3").classList.add("hidden");
  document.getElementById("result").classList.remove("hidden");

  document.getElementById("room").innerText = "Room: " + data.roomNumber;
  document.getElementById("pw").innerText = "Password: " + data.doorPassword;
}

</script>

</body>
</html>
